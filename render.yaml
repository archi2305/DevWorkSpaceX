services:
  # Backend Web Service (FastAPI)
  - type: web
    name: devworkspacex-backend
    runtime: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && alembic upgrade head || true && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devworkspacex-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://devworkspacex-frontend.onrender.com"

  # Frontend Web Service (Next.js)
  - type: web
    name: devworkspacex-frontend
    runtime: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: devworkspacex-backend
          property: url

databases:
  # PostgreSQL Database
  - name: devworkspacex-db
    databaseName: devworkspacex_db
    user: devworkspacex_user
    plan: free
